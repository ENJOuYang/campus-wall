services:
  backend:
    build:
      context: ./backend-go
    environment:
      PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/campus_wall.db}
      UPLOAD_DIR: ${UPLOAD_DIR:-./data/uploads}
      APP_NAME: ${APP_NAME:-DS 校园墙 API}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      REQUIRE_APPROVAL: ${REQUIRE_APPROVAL:-false}
      GATE_QUESTION: ${GATE_QUESTION:-ds 的中餐多少钱一份？}
      GATE_ANSWER: ${GATE_ANSWER:-13}
      INVITE_SECRET: ${INVITE_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  backend_data:
